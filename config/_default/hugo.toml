baseURL = "http://localhost:1313/"
languageCode = "en-us"
title = "AI Terms Dictionary"
theme = "aiterms"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
summaryLength = 30
enableEmoji = true
enableRobotsTXT = true
enableGitInfo = false
buildDrafts = false
buildFuture = false
paginate = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = true
    codeFences = true
    guessSyntax = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]
  page = ["HTML"]

[taxonomies]
  category = "categories"
  tag = "tags"
  difficulty = "difficulty"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[server]
  headers = [
    { Access-Control-Allow-Origin = "*" }
  ]
