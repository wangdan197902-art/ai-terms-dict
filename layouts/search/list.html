{{ define "main" }}
<section class="search-page" data-pagefind-body>
    <h1>{{ .Title }}</h1>
    {{ with .Content }}
    <div class="search-intro">{{ . }}</div>
    {{ end }}

    {{/* Pagefind 搜索 UI 容器 */}}
    <div id="search" data-pagefind-ui></div>
</section>
{{ end }}

{{ define "scripts" }}
<link href="{{ "pagefind/pagefind-ui.css" | relURL }}" rel="stylesheet">
<script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const lang = document.documentElement.lang.split('-')[0];
    const search = new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      pageSize: 10,
      filters: {
        lang: lang
      },
      translations: {
        placeholder: "{{ i18n "search_placeholder" | default "Search terms..." }}",
        empty: "{{ i18n "search_empty" | default "No results found" }}",
        results: "{{ i18n "search_results" | default "results found" }}"
      }
    });
  });
</script>
{{ end }}
