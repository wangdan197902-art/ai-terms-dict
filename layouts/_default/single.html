{{ define "main" }}
<article class="term-detail">
    <header class="term-header">
        <h1>{{ .Title }}</h1>
        {{ with .Params.term_id }}
        <p class="term-id">term_id: <code>{{ . }}</code></p>
        {{ end }}
        {{ with .Params.category }}
        <p class="term-category">Category: <a href="{{ "/categories/" | relLangURL }}{{ . | urlize }}/">{{ . }}</a></p>
        {{ end }}
    </header>

    <div class="term-content">
        {{ .Content }}
    </div>

    {{/* AdSense 广告位：文章内 300x250（待审核通过后激活） */}}
    <div class="ad-container ad-in-article" data-ad-slot="in-article">
        {{/* <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXX" data-ad-slot="XXXX" data-ad-format="auto" data-full-width-responsive="true"></ins> */}}
    </div>

    {{/* 语言切换 */}}
    {{ partial "language-switcher.html" . }}
</article>
{{ end }}
