name: Daily Domains Monitor

on:
  schedule:
    # 每天北京时间凌晨4点（UTC 20:00）
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create monitor script
        run: |
          mkdir -p scripts
          cat > scripts/daily_monitor.py << 'PYEOF'
          #!/usr/bin/env python3
          """每日监控125个域名状态"""
          
          import urllib.request
          import urllib.parse
          import ssl
          import concurrent.futures
          import json
          import time
          import sys
          
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          
          MAIN_DOMAINS = [
              "terms.ai-term-hub.com",
              "bench.ai-term-hub.com",
              "history.ai-term-hub.com",
              "alternatives.ai-term-hub.com",
              "pricing.ai-term-hub.com",
          ]
          
          LANGS = ["ar", "cs", "da", "de", "el", "en", "es", "fi", "fr", "hu",
                   "id", "it", "ja", "ko", "nl", "no", "pl", "pt", "ro", "ru",
                   "sv", "tr", "vi", "zh"]
          
          SITE_TYPES = ["terms", "bench", "history", "alternatives", "pricing"]
          
          def generate_urls():
              urls = []
              for domain in MAIN_DOMAINS:
                  urls.append(f"https://{domain}/")
              for site_type in SITE_TYPES:
                  for lang in LANGS:
                      urls.append(f"https://{site_type}-{lang}.ai-term-hub.com/")
              return urls
          
          def check_url(url):
              result = {
                  'url': url,
                  'http_status': 0,
                  'response_time': 0,
                  'content_size': 0,
                  'ssl_valid': False,
                  'gsv': False,
                  'jsonld': False,
                  'canonical': False,
                  'error': None
              }
              try:
                  start = time.time()
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=60, context=ctx) as resp:
                      result['http_status'] = resp.status
                      html = resp.read().decode('utf-8', errors='ignore')
                      result['content_size'] = len(html)
                      result['response_time'] = round(time.time() - start, 3)
                      result['ssl_valid'] = True
                      result['gsv'] = 'google-site-verification' in html
                      result['jsonld'] = 'application/ld+json' in html
                      result['canonical'] = 'rel="canonical"' in html or 'rel=canonical' in html
              except Exception as e:
                  result['error'] = str(e)
              return result
          
          urls = generate_urls()
          print(f"📋 监控 {len(urls)} 个域名")
          
          results = []
          with concurrent.futures.ThreadPoolExecutor(max_workers=10) as executor:
              future_to_url = {executor.submit(check_url, url): url for url in urls}
              for i, future in enumerate(concurrent.futures.as_completed(future_to_url), 1):
                  result = future.result()
                  results.append(result)
                  status_icon = '✅' if result['http_status'] == 200 else '❌'
                  print(f"[{i}/{len(urls)}] {status_icon} {result['url']} - {result['http_status']}")
          
          # 统计
          total = len(results)
          http_200 = sum(1 for r in results if r['http_status'] == 200)
          ssl_valid = sum(1 for r in results if r['ssl_valid'])
          gsv_pass = sum(1 for r in results if r['gsv'])
          jsonld_pass = sum(1 for r in results if r['jsonld'])
          canonical_pass = sum(1 for r in results if r['canonical'])
          
          # 失败域名
          failed = [r for r in results if r['http_status'] != 200]
          
          report = f"""# 每日域名监控报告
          
          生成时间: {time.strftime('%Y-%m-%d %H:%M:%S')}
          
          ## 总体统计
          
          | 指标 | 数值 | 通过率 |
          |------|------|--------|
          | 总域名数 | {total} | - |
          | HTTP 200 | {http_200} | {http_200/total*100:.1f}% |
          | SSL有效 | {ssl_valid} | {ssl_valid/total*100:.1f}% |
          | GSV标签 | {gsv_pass} | {gsv_pass/total*100:.1f}% |
          | JSON-LD | {jsonld_pass} | {jsonld_pass/total*100:.1f}% |
          | Canonical | {canonical_pass} | {canonical_pass/total*100:.1f}% |
          
          ## 失败域名 ({len(failed)})
          
          """
          
          if failed:
              for r in failed:
                  report += f"- {r['url']}: HTTP {r['http_status']} - {r.get('error', 'N/A')}\n"
          else:
              report += "无失败域名 ✅\n"
          
          # 保存报告
          with open('daily_report.md', 'w') as f:
              f.write(report)
          
          # 保存JSON结果
          with open('daily_results.json', 'w') as f:
              json.dump({
                  'timestamp': time.strftime('%Y%m%d_%H%M%S'),
                  'total': total,
                  'http_200': http_200,
                  'ssl_valid': ssl_valid,
                  'failed': failed,
                  'results': results
              }, f, indent=2)
          
          print(f"\n✅ 完成: {http_200}/{total} 通过")
          print(f"📁 报告: daily_report.md")
          
          # 如果失败率>5%，退出码为1
          if len(failed) / total > 0.05:
              sys.exit(1)
          PYEOF

      - name: Run monitor
        run: python3 scripts/daily_monitor.py

      - name: Upload daily report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: |
            daily_report.md
            daily_results.json
          retention-days: 90

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('daily_report.md', 'utf-8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 每日监控告警 ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['monitoring', 'alert']
            });
