name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # 每日北京时间8:00自动构建
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build with Hugo
        run: hugo --minify --baseURL "https://ai-terms-dict.pages.dev/"

      - name: Prune non-core languages
        # 分裂部署策略：主站仅保留4语种(en/zh/es/ja)以适配Cloudflare Pages 20000文件限制
        # 其他语种(de/fr + 24扩展)将部署到扩展站点
        run: |
          echo "Before prune: $(find public -type f | wc -l) files"
          rm -rf public/de public/fr public/pt public/ru public/ko public/ar public/hi public/it public/nl public/pl public/tr public/vi public/th public/id public/uk public/sv public/cs public/da public/fi public/no public/he public/ro public/hu public/el public/bg public/hr
          echo "After prune: $(find public -type f | wc -l) files"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ai-terms-dict
          directory: public
