baseURL = "/"
languageCode = "en-us"
title = "AI Terms Dictionary"
DefaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Multilingual AI Terms Dictionary"
  author = "Website Project"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 相关内容索引（用于 Related() 调用，生成相关推荐）
[related]
  threshold = 80
  includeNewer = true
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10
